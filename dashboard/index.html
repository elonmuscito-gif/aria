<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #252526;
      --surface-hover: #2d2d2f;
      --border: #3e3e42;
      --text: #cccccc;
      --text-dim: #858585;
      --gold: #c8b88a;
      --gold-dim: #7a6a4a;
      --success: #4ec9b0;
      --error: #f44747;
      --warning: #ce9178;
      --info: #569cd6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* Login/Register Screen */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 4px;
    }

    .auth-logo p {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .auth-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .auth-toggle button {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .auth-toggle button.active {
      background: var(--gold);
      color: var(--bg);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .btn {
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #d9c99e;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      background: var(--surface-hover);
      border-color: var(--text-dim);
    }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-danger:hover {
      background: #d94040;
    }

    .error-message {
      background: rgba(244, 71, 71, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* Dashboard */
    #dashboard-screen {
      min-height: 100vh;
    }

    .navbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 3px;
    }

    .navbar-user {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .navbar-user span {
      font-size: 13px;
      color: var(--text-dim);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-logout:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .dashboard-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-value.gold { color: var(--gold); }
    .stat-value.success { color: var(--success); }
    .stat-value.error { color: var(--error); }
    .stat-value.warning { color: var(--warning); }

    /* Agents List */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .agents-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .agent-row {
      display: grid;
      grid-template-columns: 2fr 1.5fr 100px 120px 100px 1fr;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .agent-row:last-child {
      border-bottom: none;
    }

    .agent-row:hover {
      background: var(--surface-hover);
    }

    .agent-row.header {
      background: var(--bg);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: default;
    }

    .agent-row.header:hover {
      background: var(--bg);
    }

    .agent-name {
      font-weight: 500;
    }

    .agent-did {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    .trust-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
    }

    .trust-score.high { color: var(--success); }
    .trust-score.medium { color: var(--warning); }
    .trust-score.low { color: var(--error); }

    .trust-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .trust-badge.trusted {
      background: rgba(78, 201, 176, 0.15);
      color: var(--success);
    }
    .trust-badge.neutral {
      background: rgba(206, 145, 120, 0.15);
      color: var(--warning);
    }
    .trust-badge.untrusted {
      background: rgba(244, 71, 71, 0.15);
      color: var(--error);
    }

    /* Events Feed */
    .events-feed {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .event-item:last-child {
      border-bottom: none;
    }

    .event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-dot.success { background: var(--success); }
    .event-dot.error { background: var(--error); }
    .event-dot.anomaly { background: var(--warning); }

    .event-action {
      flex: 1;
      font-weight: 500;
    }

    .event-agent {
      color: var(--text-dim);
      font-size: 13px;
    }

    .event-time {
      color: var(--text-dim);
      font-size: 12px;
    }

    .badge-violation {
      background: rgba(244, 71, 71, 0.15);
      color: var(--error);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Agent Detail */
    #agent-detail {
      padding: 24px;
    }

    .btn-back {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back:hover {
      color: var(--text);
    }

    .detail-header {
      margin-bottom: 32px;
    }

    .detail-name {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .detail-did {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
    }

    .detail-score {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .detail-score-value {
      font-size: 64px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .detail-score-value.high { color: var(--success); }
    .detail-score-value.medium { color: var(--warning); }
    .detail-score-value.low { color: var(--error); }

    .scope-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 24px 0;
    }

    .scope-tag {
      background: rgba(200, 184, 138, 0.15);
      color: var(--gold);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
    }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .detail-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .detail-stat-value {
      font-size: 24px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .detail-stat-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .events-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .detail-event {
      display: grid;
      grid-template-columns: 1fr 100px 100px 100px;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .detail-event:last-child {
      border-bottom: none;
    }

    .detail-event.header {
      background: var(--bg);
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      cursor: default;
    }

    /* API Keys */
    .api-keys-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    .api-key-display {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .api-key-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      background: var(--bg);
      padding: 12px 16px;
      border-radius: 4px;
      flex: 1;
    }

    .api-key-actions {
      display: flex;
      gap: 12px;
    }

    .warning-box {
      background: rgba(244, 71, 71, 0.1);
      border: 1px solid var(--error);
      border-radius: 4px;
      padding: 16px;
      margin-top: 16px;
    }

    .warning-box p {
      color: var(--error);
      font-size: 13px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state h3 {
      color: var(--text);
      margin-bottom: 8px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px;
    }

    .pagination button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .pagination button:hover {
      border-color: var(--gold);
    }

    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .agent-row {
        grid-template-columns: 1fr 80px 80px;
      }

      .agent-row .agent-did,
      .agent-row .agent-events,
      .agent-row .agent-last-seen {
        display: none;
      }

      .stats-row {
        grid-template-columns: 1fr 1fr;
      }

      .detail-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>ARIA</h1>
        <p>Autonomous Registry for Intelligence Accountability</p>
      </div>

      <div class="auth-toggle">
        <button id="btn-login-toggle" class="active" onclick="showAuthTab('login')">Login</button>
        <button id="btn-register-toggle" onclick="showAuthTab('register')">Register</button>
      </div>

      <div id="auth-error" class="error-message hidden"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn" id="login-btn">Login</button>
      </form>

      <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="register-name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="register-password" required minlength="8">
        </div>
        <button type="submit" class="btn" id="register-btn">Create Account</button>
      </form>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard-screen" class="hidden">
    <nav class="navbar">
      <div class="navbar-brand">ARIA</div>
      <div class="navbar-user">
        <span id="user-email"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="dashboard-content">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="showTab('overview')">Overview</button>
        <button class="tab" onclick="showTab('apikeys')">API Keys</button>
      </div>

      <!-- Overview Tab -->
      <div id="tab-overview" class="tab-content">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Agents</div>
            <div class="stat-value" id="stat-agents">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Events</div>
            <div class="stat-value gold" id="stat-events">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Anomalies</div>
            <div class="stat-value error" id="stat-anomalies">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Trust Score</div>
            <div class="stat-value success" id="stat-trust">0%</div>
          </div>
        </div>

        <div class="section-title">Agents</div>
        <div class="agents-list" id="agents-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>

        <div class="section-title" style="margin-top: 32px;">Recent Events</div>
        <div class="events-feed" id="events-feed">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Agent Detail Tab -->
      <div id="tab-agent" class="tab-content hidden">
        <div id="agent-detail"></div>
      </div>

      <!-- API Keys Tab -->
      <div id="tab-apikeys" class="tab-content hidden">
        <div class="api-keys-card">
          <div class="section-title">Your API Key</div>
          <div class="api-key-display">
            <div class="api-key-value" id="current-api-key">Loading...</div>
          </div>
          <div class="api-key-actions">
            <button class="btn btn-outline" onclick="createApiKey()">Create New Key</button>
            <button class="btn btn-danger" onclick="rotateApiKey()">Rotate Key</button>
          </div>
          <div class="warning-box">
            <p>⚠️ Rotating your key will immediately revoke the current key. Any applications using the old key will stop working.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://aria-production-0458.up.railway.app';
    let apiKey = localStorage.getItem('aria_api_key');
    let userEmail = '';
    let currentTab = 'overview';
    let selectedAgentDid = null;
    let refreshInterval = null;

    // Auth
    function showAuthTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.getElementById('btn-login-toggle').classList.toggle('active', tab === 'login');
      document.getElementById('btn-register-toggle').classList.toggle('active', tab === 'register');
      document.getElementById('auth-error').classList.add('hidden');
    }

    function showAuthError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch(`${API_BASE}/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Login failed');
        }

        const data = await res.json();
        apiKey = data.api_key;
        userEmail = email;
        localStorage.setItem('aria_api_key', apiKey);
        showDashboard();
      } catch (err) {
        showAuthError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API_BASE}/v1/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Registration failed');
        }

        const data = await res.json();
        apiKey = data.api_key;
        userEmail = email;
        localStorage.setItem('aria_api_key', apiKey);
        showDashboard();
      } catch (err) {
        showAuthError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function logout() {
      apiKey = null;
      userEmail = '';
      localStorage.removeItem('aria_api_key');
      clearInterval(refreshInterval);
      document.getElementById('dashboard-screen').classList.add('hidden');
      document.getElementById('auth-screen').classList.remove('hidden');
    }

    // Dashboard
    function showDashboard() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      document.getElementById('user-email').textContent = userEmail;
      loadDashboard();
      refreshInterval = setInterval(loadDashboard, 10000);
    }

    async function apiCall(endpoint, options = {}) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
          ...options.headers
        }
      });
      if (!res.ok) {
        if (res.status === 401) {
          logout();
          throw new Error('Session expired');
        }
        throw new Error(`API error: ${res.status}`);
      }
      return res.json();
    }

    async function loadDashboard() {
      if (currentTab === 'overview') {
        await Promise.all([loadStats(), loadAgents(), loadRecentEvents()]);
      } else if (currentTab === 'agent' && selectedAgentDid) {
        await loadAgentDetail(selectedAgentDid);
      }
    }

    async function loadStats() {
      try {
        const agents = await apiCall('/v1/agents');
        const events = await apiCall('/v1/events?limit=100');

        const totalAgents = agents.agents?.length || 0;
        const totalEvents = events.events?.length || 0;
        const anomalies = events.events?.filter(e => e.outcome === 'anomaly').length || 0;

        let avgTrust = 0;
        if (agents.agents?.length) {
          const scores = agents.agents.map(a => parseInt(a.success_rate) || 0).filter(s => s > 0);
          avgTrust = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
        }

        document.getElementById('stat-agents').textContent = totalAgents;
        document.getElementById('stat-events').textContent = totalEvents;
        document.getElementById('stat-anomalies').textContent = anomalies;
        document.getElementById('stat-trust').textContent = avgTrust + '%';
      } catch (err) {
        console.error('Failed to load stats:', err);
      }
    }

    async function loadAgents() {
      try {
        const data = await apiCall('/v1/agents');
        const agents = data.agents || [];

        if (agents.length === 0) {
          document.getElementById('agents-list').innerHTML = `
            <div class="empty-state">
              <h3>No agents yet</h3>
              <p>Register your first agent using the SDK to see it here.</p>
            </div>
          `;
          return;
        }

        let html = `
          <div class="agent-row header">
            <div>Agent</div>
            <div>DID</div>
            <div>Trust</div>
            <div>Level</div>
            <div>Events</div>
            <div>Last Seen</div>
          </div>
        `;

        agents.forEach(agent => {
          const score = parseInt(agent.success_rate) || 0;
          const trustClass = score >= 80 ? 'high' : score >= 50 ? 'medium' : 'low';
          const trustBadge = score >= 80 ? 'trusted' : score >= 50 ? 'neutral' : 'untrusted';
          const trustLabel = score >= 80 ? 'TRUSTED' : score >= 50 ? 'NEUTRAL' : 'UNTRUSTED';

          html += `
            <div class="agent-row" onclick="showAgentDetail('${agent.masked_did}')">
              <div class="agent-name">${escapeHtml(agent.name)}</div>
              <div class="agent-did">${escapeHtml(agent.masked_did)}</div>
              <div class="trust-score ${trustClass}">${score}%</div>
              <div><span class="trust-badge ${trustBadge}">${trustLabel}</span></div>
              <div class="agent-events">${agent.total_events || 0}</div>
              <div class="agent-last-seen">${relativeTime(agent.last_seen)}</div>
            </div>
          `;
        });

        document.getElementById('agents-list').innerHTML = html;
      } catch (err) {
        document.getElementById('agents-list').innerHTML = `<div class="error-message">Failed to load agents</div>`;
      }
    }

    async function loadRecentEvents() {
      try {
        const data = await apiCall('/v1/events?limit=10');
        const events = data.events || [];

        if (events.length === 0) {
          document.getElementById('events-feed').innerHTML = `
            <div class="empty-state">
              <h3>No events yet</h3>
              <p>Track events from your agents to see them here.</p>
            </div>
          `;
          return;
        }

        let html = '';
        events.forEach(event => {
          const outcomeClass = event.outcome === 'success' ? 'success' : event.outcome === 'anomaly' ? 'anomaly' : 'error';
          const withinScope = event.server_within_scope !== false;

          html += `
            <div class="event-item">
              <div class="event-dot ${outcomeClass}"></div>
              <div class="event-action">${escapeHtml(event.action)}</div>
              <div class="event-agent">${escapeHtml(event.agent_name || 'Unknown')}</div>
              <div class="event-time">${relativeTime(event.client_ts)}</div>
              ${!withinScope ? '<span class="badge-violation">SCOPE VIOLATION</span>' : ''}
            </div>
          `;
        });

        document.getElementById('events-feed').innerHTML = html;
      } catch (err) {
        document.getElementById('events-feed').innerHTML = `<div class="error-message">Failed to load events</div>`;
      }
    }

    // Tabs
    function showTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tab}`).classList.remove('hidden');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');

      if (tab === 'overview') {
        loadDashboard();
      } else if (tab === 'apikeys') {
        loadApiKeys();
      }
    }

    // Agent Detail
    async function showAgentDetail(did) {
      currentTab = 'agent';
      selectedAgentDid = did;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-agent').classList.remove('hidden');
      await loadAgentDetail(did);
    }

    async function loadAgentDetail(did) {
      const container = document.getElementById('agent-detail');

      try {
        const data = await apiCall(`/v1/agents/${did}`);
        const agent = data.agent;

        container.innerHTML = `
          <button class="btn-back" onclick="goBack()">← Back to Overview</button>
          <div class="detail-header">
            <div class="detail-name">${escapeHtml(agent.name)}</div>
            <div class="detail-did">${escapeHtml(agent.did)}</div>
            <div class="detail-score">
              <div class="detail-score-value ${getScoreClass(agent.success_rate)}">${agent.success_rate || 0}%</div>
              <div><span class="trust-badge ${getTrustBadgeClass(agent.success_rate)}">${getTrustLabel(agent.success_rate)}</span></div>
            </div>
            <div class="scope-tags">
              ${(agent.scope || []).map(s => `<span class="scope-tag">${escapeHtml(s)}</span>`).join('')}
            </div>
          </div>
          <div class="detail-stats">
            <div class="detail-stat">
              <div class="detail-stat-value">${agent.total_events || 0}</div>
              <div class="detail-stat-label">Total Events</div>
            </div>
            <div class="detail-stat">
              <div class="detail-stat-value">${agent.success_count || 0}</div>
              <div class="detail-stat-label">Successful</div>
            </div>
            <div class="detail-stat">
              <div class="detail-stat-value">${agent.anomaly_count || 0}</div>
              <div class="detail-stat-label">Anomalies</div>
            </div>
          </div>
          <div class="section-title">Event History</div>
          <div class="events-list" id="detail-events"></div>
        `;

        // Load agent events
        const events = await apiCall(`/v1/events?agentDid=${encodeURIComponent(did)}&limit=20`);
        const eventList = events.events || [];

        if (eventList.length === 0) {
          document.getElementById('detail-events').innerHTML = `
            <div class="empty-state">
              <h3>No events yet</h3>
            </div>
          `;
        } else {
          let html = `
            <div class="detail-event header">
              <div>Action</div>
              <div>Outcome</div>
              <div>Duration</div>
              <div>Time</div>
            </div>
          `;

          eventList.forEach(event => {
            const outcomeClass = event.outcome === 'success' ? 'success' : event.outcome === 'anomaly' ? 'warning' : 'error';
            html += `
              <div class="detail-event">
                <div>${escapeHtml(event.action)}</div>
                <div style="color: var(--${outcomeClass})">${event.outcome}</div>
                <div>${event.duration_ms}ms</div>
                <div>${relativeTime(event.client_ts)}</div>
              </div>
            `;
          });

          document.getElementById('detail-events').innerHTML = html;
        }
      } catch (err) {
        container.innerHTML = `<div class="error-message">Failed to load agent: ${err.message}</div>`;
      }
    }

    function goBack() {
      currentTab = 'overview';
      selectedAgentDid = null;
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-overview').classList.remove('hidden');
      loadDashboard();
    }

    // API Keys
    async function loadApiKeys() {
      document.getElementById('current-api-key').textContent = apiKey ? maskApiKey(apiKey) : 'None';
    }

    async function createApiKey() {
      const label = prompt('Enter a label for the new key:');
      if (!label) return;

      try {
        const data = await apiCall('/v1/api-keys', {
          method: 'POST',
          body: JSON.stringify({ label })
        });

        apiKey = data.api_key;
        localStorage.setItem('aria_api_key', apiKey);
        loadApiKeys();
        alert('New API key created!');
      } catch (err) {
        alert('Failed to create key: ' + err.message);
      }
    }

    async function rotateApiKey() {
      if (!confirm('This will immediately revoke your current API key. Continue?')) return;

      try {
        const data = await apiCall('/v1/api-keys/rotate', {
          method: 'POST',
          body: JSON.stringify({})
        });

        apiKey = data.new_api_key;
        localStorage.setItem('aria_api_key', apiKey);
        loadApiKeys();
        alert('Key rotated successfully!');
      } catch (err) {
        alert('Failed to rotate key: ' + err.message);
      }
    }

    // Helpers
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function relativeTime(dateStr) {
      if (!dateStr) return 'Never';
      const date = new Date(dateStr);
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);

      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
      return date.toLocaleDateString();
    }

    function maskApiKey(key) {
      if (!key || key.length < 8) return '****';
      return key.slice(0, 8) + '...' + key.slice(-4);
    }

    function getScoreClass(score) {
      score = parseInt(score) || 0;
      return score >= 80 ? 'high' : score >= 50 ? 'medium' : 'low';
    }

    function getTrustBadgeClass(score) {
      score = parseInt(score) || 0;
      return score >= 80 ? 'trusted' : score >= 50 ? 'neutral' : 'untrusted';
    }

    function getTrustLabel(score) {
      score = parseInt(score) || 0;
      return score >= 80 ? 'TRUSTED' : score >= 50 ? 'NEUTRAL' : 'UNTRUSTED';
    }

    // Init
    if (apiKey) {
      apiCall('/v1/agents').then(() => showDashboard()).catch(() => {
        localStorage.removeItem('aria_api_key');
      });
    }
  </script>
</body>
</html>
